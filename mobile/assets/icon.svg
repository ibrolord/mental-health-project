  <path d="M 360 420 C 400 410, 440 440, 480 420" stroke="url(#bg)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 340 500 C 380 490, 420 520, 480 500" stroke="url(#bg)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 360 580 C 400 570, 440 600, 480 580" stroke="url(#bg)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 380 660 C 410 650, 440 670, 480 660" stroke="url(#bg)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Brain fold lines right -->
