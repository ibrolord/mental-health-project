  <path d="M 544 500 C 584 490, 624 520, 684 500" stroke="url(#bg)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 544 580 C 584 570, 624 600, 664 580" stroke="url(#bg)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 544 660 C 574 650, 604 670, 644 660" stroke="url(#bg)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Small heart at top center where hemispheres meet -->
  <path d="M 512 370 C 512 360, 500 345, 488 345 C 472 345, 462 360, 462 372 C 462 395, 512 420, 512 420 C 512 420, 562 395, 562 372 C 562 360, 552 345, 536 345 C 524 345, 512 360, 512 370 Z" fill="#f472b6"/>
